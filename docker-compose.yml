version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agent_postgres
    environment:
      POSTGRES_DB: report_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret_password_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agent_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: agent_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:secret_password_db@postgres:5432/report_db
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/static:/app/static

  frontend:
    build: ./frontend
    container_name: agent_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
